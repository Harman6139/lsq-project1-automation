name: Publish Workspace

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "Project_1_May2026_Update.*"
      - "Harman_Boyle_Project1_May2026_Overleaf_Update.zip"
      - "manifest.json"
      - "data/**"
      - "tables/**"
      - "scripts/**"
      - "workspace/**"
      - "workspace_artifacts.json"
      - "WORKSPACE_README.md"
      - "README.md"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build live LaTeX workspace
        run: python scripts/build_latex_workspace.py --project-dir . --output-dir _latex_workspace

      - name: Push live LaTeX workspace to Overleaf
        env:
          OVERLEAF_GIT_URL: ${{ secrets.OVERLEAF_GIT_URL }}
          OVERLEAF_GIT_TOKEN: ${{ secrets.OVERLEAF_GIT_TOKEN }}
        run: |
          if [ -z "$OVERLEAF_GIT_URL" ] || [ -z "$OVERLEAF_GIT_TOKEN" ]; then
            echo "Overleaf Git secrets not configured. Skipping Overleaf mirror."
            exit 0
          fi
          python scripts/push_to_overleaf.py --workspace-dir _latex_workspace

      - name: Publish workspace to Google Drive
        env:
          APPS_SCRIPT_WEB_APP_URL: ${{ secrets.APPS_SCRIPT_WEB_APP_URL }}
          APPS_SCRIPT_UPLOAD_SECRET: ${{ secrets.APPS_SCRIPT_UPLOAD_SECRET }}
        run: python scripts/publish_workspace.py --project-dir .
